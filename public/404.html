<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>404 — Page Not Found · Nexora Studio</title>
    <link rel="icon" type="image/png" sizes="256x256" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #05060a;
        color: #fff;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        text-align: center;
        padding: 24px;
        overflow: hidden;
        position: relative;
        -webkit-font-smoothing: antialiased;
      }
      .glow {
        position: fixed;
        border-radius: 9999px;
        filter: blur(120px);
        z-index: 0;
        pointer-events: none;
      }
      .glow.a {
        width: 420px;
        height: 420px;
        background: #3b82f6;
        opacity: 0.32;
        top: -130px;
        left: -90px;
      }
      .glow.b {
        width: 380px;
        height: 380px;
        background: #8b5cf6;
        opacity: 0.3;
        bottom: -120px;
        right: -70px;
      }
      .glow.c {
        width: 300px;
        height: 300px;
        background: #22d3ee;
        opacity: 0.18;
        top: 42%;
        left: 50%;
        transform: translateX(-50%);
      }
      .wrap {
        position: relative;
        z-index: 1;
        max-width: 520px;
      }
      .logo {
        height: 34px;
        width: auto;
        margin: 0 auto 44px;
        display: block;
        opacity: 0.95;
      }
      .code {
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 700;
        font-size: clamp(84px, 18vw, 150px);
        line-height: 1;
        letter-spacing: -0.02em;
        background: linear-gradient(120deg, #3b82f6, #8b5cf6, #22d3ee);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        color: transparent;
      }
      h1 {
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 600;
        font-size: clamp(20px, 4vw, 26px);
        margin-top: 20px;
      }
      p {
        color: rgba(255, 255, 255, 0.55);
        margin-top: 14px;
        line-height: 1.6;
        font-size: 15px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-top: 34px;
        padding: 13px 26px;
        border-radius: 9999px;
        text-decoration: none;
        font-weight: 600;
        font-size: 14px;
        color: #fff;
        background: linear-gradient(90deg, #3b82f6, #8b5cf6);
        box-shadow: 0 8px 30px rgba(59, 130, 246, 0.35);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
      .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 38px rgba(139, 92, 246, 0.45);
      }
    </style>
  </head>
  <body>
    <div class="glow a"></div>
    <div class="glow b"></div>
    <div class="glow c"></div>
    <div class="wrap">
      <img class="logo" src="/logo.png" alt="Nexora Studio" />
      <div class="code">404</div>
      <h1>This page slipped into the void.</h1>
      <p>
        The page you're looking for doesn't exist or may have moved. Let's get
        you back to something real.
      </p>
      <a class="btn" href="/">&larr;&nbsp;&nbsp;Back to Nexora Studio</a>
    </div>
  </body>
</html>
